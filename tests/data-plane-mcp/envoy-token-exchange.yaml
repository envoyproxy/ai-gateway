admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
    - address:
        socket_address:
          address: 0.0.0.0
          port_value: 1062
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: auto
                access_log:
                  - name: stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          session.id: "%DYNAMIC_METADATA(io.envoy.ai_gateway:session.id)%"
                          mcp.provider.name: "%DYNAMIC_METADATA(io.envoy.ai_gateway:mcp_backend)%"
                          mcp.method.name: "%DYNAMIC_METADATA(io.envoy.ai_gateway:mcp_method)%"
                          mcp.tool.name: "%DYNAMIC_METADATA(io.envoy.ai_gateway:mcp_tool_name)%"
                          jsonrpc.request.id: "%DYNAMIC_METADATA(io.envoy.ai_gateway:mcp_request_id)%"
                          method: "%REQ(:METHOD)%"
                          request.path: "%REQ(:PATH)%"
                          x-envoy-origin-path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                route_config:
                  virtual_hosts:
                    - name: local_route
                      domains:
                        - "*"
                      routes:
                        - match:
                            path: "/mcp"
                          request_headers_to_add:
                            - header:
                                key: x-ai-eg-mcp-route
                                value: test-route
                          route:
                            cluster: mcp_proxy
                            idleTimeout: 3600s
                            timeout: 120s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                      suppressEnvoyHeaders: true

    # Special listener only handling direct routing to mcp server without ext_proc, which
    # allows the ext_proc in the main listener to send the request to the mcp servers to collect
    # session IDs etc.
    - name: mcp_backend_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9999
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: auto
                access_log:
                  - name: stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          session.id: "%DYNAMIC_METADATA(io.envoy.ai_gateway:session.id)%"
                          mcp.provider.name: "%DYNAMIC_METADATA(io.envoy.ai_gateway:mcp_backend)%"
                          mcp.method.name: "%DYNAMIC_METADATA(io.envoy.ai_gateway:mcp_method)%"
                          mcp.tool.name: "%DYNAMIC_METADATA(io.envoy.ai_gateway:mcp_tool_name)%"
                          jsonrpc.request.id: "%DYNAMIC_METADATA(io.envoy.ai_gateway:mcp_request_id)%"
                          method: "%REQ(:METHOD)%"
                          request.path: "%REQ(:PATH)%"
                          x-envoy-origin-path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                route_config:
                  virtual_hosts:
                    - name: local_route
                      retry_policy:
                        retry_on: "5xx,gateway-error,reset,rest-before-request,connect-failure,envoy-ratelimited,retriable-4xx,refused-stream,retriable-status-codes,retriable-headers"
                        num_retries: 5
                        per_try_timeout: "30s"
                        retry_back_off:
                          base_interval: "0.1s"
                          max_interval: "1s"
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/"
                            headers:
                              - name: x-ai-eg-mcp-backend
                                string_match:
                                  exact: te-backend
                          route:
                            cluster: te-backend
                            idleTimeout: 3600s
                            timeout: 120s
                            pathRewrite: /mcp
                          typed_per_filter_config:
                            token-exchange:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilterPerRoute
                              dynamic_module_config:
                                name: aigateway
                              per_route_config_name: token-exchange
                              filter_config:
                                "@type": type.googleapis.com/google.protobuf.StringValue
                                value: '{"cluster":"mcp-sts-backend","token_exchange_url":"http://127.0.0.1:1075/token","client_id":"aigw-client","client_secret":"aigw-client-secret","subject_token_type":"urn:ietf:params:oauth:token-type:access_token","audience":"mcp-upstream","scope":"mcp.read","actor_token":"gateway-actor-token","actor_token_type":"urn:ietf:params:oauth:token-type:access_token","timeout_ms":5000}'
                http_filters:
                  - name: envoy.filters.http.header_to_metadata
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.header_to_metadata.v3.Config
                      request_rules:
                        - header: x-ai-eg-mcp-backend
                          on_header_present:
                            metadata_namespace: io.envoy.ai_gateway
                            key: mcp_backend
                            type: STRING
                          remove: true
                        - header: x-ai-eg-mcp-metadata-method
                          on_header_present:
                            metadata_namespace: io.envoy.ai_gateway
                            key: mcp_method
                            type: STRING
                          remove: true
                        - header: x-ai-eg-mcp-metadata-tool-name
                          on_header_present:
                            metadata_namespace: io.envoy.ai_gateway
                            key: mcp_tool_name
                            type: STRING
                          remove: true
                        - header: x-ai-eg-mcp-metadata-request-id
                          on_header_present:
                            metadata_namespace: io.envoy.ai_gateway
                            key: mcp_request_id
                            type: STRING
                          remove: true
                        - header: agent-session-id
                          on_header_present:
                            metadata_namespace: io.envoy.ai_gateway
                            key: session.id
                            type: STRING
                  - name: token-exchange
                    disabled: true
                    is_optional: true
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
                      dynamic_module_config:
                        name: aigateway
                      filter_name: token-exchange
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: extproc_cluster
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options:
              connection_keepalive:
                interval: 30s
                timeout: 5s
      load_assignment:
        cluster_name: extproc_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 1063

    - name: mcp_proxy
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: mcp_proxy
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 9856 # Special port where the test MCP server is running inside the extproc process.

    - name: te-backend
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: te-backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 8082

    - name: mcp-sts-backend
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: mcp-sts-backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 1075

overload_manager:
  refresh_interval: 0.25s
  resource_monitors:
    - name: "envoy.resource_monitors.global_downstream_max_connections"
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.resource_monitors.downstream_connections.v3.DownstreamConnectionsConfig
        max_active_downstream_connections: 1000
