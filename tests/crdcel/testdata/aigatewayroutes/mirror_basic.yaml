# A valid mirror: the mirror backendRef references an AIServiceBackend by name only
# and carries a per-mirror modelNameOverride.

apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: mirror-basic
  namespace: default
spec:
  parentRefs:
    - name: some-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: llama3-70b
      backendRefs:
        - name: primary
      mirrors:
        - backendRef:
            name: shadow
            modelNameOverride: shadow-overridden
          percent: 50
