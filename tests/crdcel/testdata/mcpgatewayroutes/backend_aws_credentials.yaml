apiVersion: aigateway.envoyproxy.io/v1beta1
kind: MCPRoute
metadata:
  name: backend-aws-credentials
  namespace: default
spec:
  parentRefs:
    - name: some-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  backendRefs:
    - name: aws-mcp-backend
      kind: Backend
      group: gateway.envoyproxy.io
      securityPolicy:
        awsCredentials:
          region: us-east-1
          service: bedrock-agentcore
