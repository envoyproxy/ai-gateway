---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: lua-filter-order
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: lua-filter-order
  namespace: default
spec:
  gatewayClassName: lua-filter-order
  listeners:
    - name: http
      protocol: HTTP
      port: 80
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: lua-filter-order
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: lua-filter-order
  namespace: default
spec:
  luaValidation: InsecureSyntax
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        container:
          resources: {}
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: lua-filter-order
  namespace: default
spec:
  parentRefs:
    - name: lua-filter-order
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: test-model
      backendRefs:
        - name: lua-filter-order-backend
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIServiceBackend
metadata:
  name: lua-filter-order-backend
  namespace: default
spec:
  schema:
    name: OpenAI
  backendRef:
    name: lua-filter-order-testupstream
    kind: Backend
    group: gateway.envoyproxy.io
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: lua-filter-order-testupstream
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: lua-filter-order-testupstream.default.svc.cluster.local
        port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lua-filter-order-testupstream
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lua-filter-order-testupstream
  template:
    metadata:
      labels:
        app: lua-filter-order-testupstream
    spec:
      containers:
        - name: testupstream
          image: ugw-test.common.repositories.cloud.sap/envoyproxy/ai-gateway-testupstream:arm64-v2
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: TESTUPSTREAM_ID
              value: lua-filter-order
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 1
---
apiVersion: v1
kind: Service
metadata:
  name: lua-filter-order-testupstream
  namespace: default
spec:
  selector:
    app: lua-filter-order-testupstream
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lua-filter-order-script
  namespace: default
data:
  lua: |
    function envoy_on_response(response_handle)
      if response_handle:headers():get(":status") ~= "200" then return end
      local enc = response_handle:headers():get("content-encoding")
      if enc ~= nil and enc ~= "" and enc ~= "identity" then return end
      local b = response_handle:body()
      if b == nil then return end
      local s = b:getBytes(0, b:length())
      local new = s:gsub('"content"%s*:%s*"([^"]*)"', function(v)
        return '"content":"' .. v .. ' - MUTATED"'
      end)
      b:setBytes(new)
      response_handle:headers():replace("content-length", tostring(#new))
    end
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: lua-filter-order
  namespace: default
  annotations:
    aigateway.envoyproxy.io/lua-filter-order: post-extproc
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: lua-filter-order
  lua:
    - type: ValueRef
      valueRef:
        group: ""
        kind: ConfigMap
        name: lua-filter-order-script
