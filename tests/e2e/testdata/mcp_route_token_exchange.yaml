---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: testmcpserver-tokenexchange
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testmcpserver-tokenexchange
  template:
    metadata:
      labels:
        app: testmcpserver-tokenexchange
    spec:
      containers:
        - name: testmcpserver-tokenexchange
          image: docker.io/envoyproxy/ai-gateway-testmcpserver:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1063
          env:
            - name: TEST_EXPECTED_EXCHANGED_ACTOR
              value: test-mcp-gateway-actor
---
apiVersion: v1
kind: Service
metadata:
  name: testmcpserver-tokenexchange
  namespace: default
spec:
  selector:
    app: testmcpserver-tokenexchange
  ports:
    - protocol: TCP
      port: 1063
      targetPort: 1063
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-token-exchange
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-token-exchange
  template:
    metadata:
      labels:
        app: test-token-exchange
    spec:
      containers:
        - name: test-token-exchange
          image: docker.io/envoyproxy/ai-gateway-testtokenexchange:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1075
          env:
            - name: LISTENER_PORT
              value: "1075"
---
apiVersion: v1
kind: Service
metadata:
  name: test-token-exchange
  namespace: default
spec:
  selector:
    app: test-token-exchange
  ports:
    - protocol: TCP
      port: 1075
      targetPort: 1075
  type: ClusterIP
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-mcp-gateway-token-exchange
  namespace: default
spec:
  logging:
    level:
      # Get all messages from the token exchange dynamic module
      dynamic_modules: debug
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        # When creating the Kind cluster we mount the host path where the compiled
        # dynamic module is located, so we can use it in the Envoy deployment.
        pod:
          volumes:
            - name: dym
              hostPath:
                # This path is configured in the Kind configuration file
                path: /var/dym/libaigateway.so
                type: File
        container:
          # Clear the default memory/cpu requirements for local tests.
          resources: {}
          # Mount the dynamic module in the Envoy container so that we can use
          # the MCP token exchange features.
          volumeMounts:
            - name: dym
              mountPath: /var/dym/libaigateway.so
          env:
            # Configure the path where Envoy will look for dynamic module files
            - name: ENVOY_DYNAMIC_MODULES_SEARCH_PATH
              value: /var/dym
            # Needed for Go-based dynamic modules to disable the cgo pointer checks as
            # Envoy may hold pointers to Go memory.
            - name: GODEBUG
              value: "cgocheck=0"
