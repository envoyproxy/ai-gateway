apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: mcp-gateway-class-token-exchange
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcp-gateway-token-exchange
  namespace: default
spec:
  gatewayClassName: mcp-gateway-class-token-exchange
  listeners:
    - name: http
      protocol: HTTP
      port: 80
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: envoy-mcp-gateway-token-exchange
---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-gateway-client-secret
  namespace: default
type: Opaque
stringData:
  clientSecret: "test-client-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: actor-token-key
  namespace: default
type: Opaque
stringData:
  privateKey: "test-actor-token-private-key"
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: MCPRoute
metadata:
  name: mcp-route-token-exchange
  namespace: default
spec:
  parentRefs:
    - name: mcp-gateway-token-exchange
      kind: Gateway
      group: gateway.networking.k8s.io
  backendRefs:
    - name: testmcpserver-tokenexchange
      port: 1063
      securityPolicy:
        tokenExchange:
          stsEndpoint: "http://test-token-exchange.default:1075/token"
          clientAuth:
            clientID: test-mcp-gateway
            clientSecretRef:
              name: mcp-gateway-client-secret
          actorToken:
            clientAssertionJWT:
              issuer: "https://auth-server.example.com"
              subject: test-mcp-gateway-actor
              lifetime: 600
              signingAlgorithm: HS256
              privateKeyRef:
                name: actor-token-key
  securityPolicy:
    oauth:
      issuer: "https://auth-server.example.com"
      jwks:
        localJWKS:
          type: ValueRef
          valueRef:
            group: ""
            kind: ConfigMap
            name: jwks-configmap
      protectedResourceMetadata:
        resource: "https://foo.bar.com/mcp"
---
