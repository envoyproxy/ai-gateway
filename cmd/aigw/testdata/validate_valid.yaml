apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: test-route
  namespace: default
spec:
  parentRefs:
    - name: test-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: gpt-4o-mini
      backendRefs:
        - name: test-openai
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: claude-3-5-sonnet
      backendRefs:
        - name: test-anthropic
  llmRequestCosts:
    - metadataKey: llm_input_token
      type: InputToken
    - metadataKey: llm_output_token
      type: OutputToken
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIServiceBackend
metadata:
  name: test-openai
  namespace: default
spec:
  schema:
    name: OpenAI
  backendRef:
    name: test-openai-backend
    kind: Backend
    group: gateway.envoyproxy.io
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIServiceBackend
metadata:
  name: test-anthropic
  namespace: default
spec:
  schema:
    name: Anthropic
  backendRef:
    name: test-anthropic-backend
    kind: Backend
    group: gateway.envoyproxy.io
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: BackendSecurityPolicy
metadata:
  name: test-openai-apikey
  namespace: default
spec:
  targetRefs:
    - group: aigateway.envoyproxy.io
      kind: AIServiceBackend
      name: test-openai
  type: APIKey
  apiKey:
    secretRef:
      name: test-openai-apikey-secret
      namespace: default
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: BackendSecurityPolicy
metadata:
  name: test-anthropic-apikey
  namespace: default
spec:
  targetRefs:
    - group: aigateway.envoyproxy.io
      kind: AIServiceBackend
      name: test-anthropic
  type: AnthropicAPIKey
  anthropicAPIKey:
    secretRef:
      name: test-anthropic-apikey-secret
      namespace: default
