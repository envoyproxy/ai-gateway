---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: MCPRoute
metadata:
  name: mcp-route
  namespace: default
spec:
  parentRefs:
    - name: aigw-run
      kind: Gateway
      group: gateway.networking.k8s.io
  # Frontend authentication: validate incoming user tokens at the gateway edge.
  securityPolicy:
    oauth:
      issuer: "http://127.0.0.1.nip.io:8080/realms/master"
      audiences:
        - mcp-gateway
      jwks:
        remoteJWKS:
          uri: http://127.0.0.1.nip.io:8080/realms/master/protocol/openid-connect/certs
      protectedResourceMetadata:
        resource: "http://localhost:1975/mcp"
        scopesSupported:
          - mcp
  backendRefs:
    - name: kiwi
      kind: Backend
      group: gateway.envoyproxy.io
      path: "/"
      # Kiwi will ignore the Authorization header with the exchanged token, but this is to demonstrate how to configure
      # the gateway to perform token exchange for backends that require it.
      securityPolicy:
        tokenExchange:
          stsEndpoint: "http://127.0.0.1.nip.io:8080/realms/master/protocol/openid-connect/token"
          clientAuth:
            clientID: mcp-gateway
            clientSecretRef:
              name: mcp-gateway-client-secret
          actorToken:
            clientAssertionJWT:
              issuer: "https://mcp-gateway.default"
              subject: mcp-gateway
              lifetime: 600
              signingAlgorithm: HS256
              privateKeyRef:
                name: actor-token-key
---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-gateway-client-secret
  namespace: default
type: Opaque
stringData:
  # clientSecret: "mcp-gateway-client-secret"
  clientSecret: "vlBY5qJ9HldlkIb3EF5LqgXadlkXdjWC"
---
apiVersion: v1
kind: Secret
metadata:
  name: actor-token-key
  namespace: default
type: Opaque
stringData:
  privateKey: "actor-token-private-key"
---
###################################################################################
############################### Backend Definitions ###############################
###################################################################################
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: kiwi
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: mcp.kiwi.com
        port: 443
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: kiwi-tls
  namespace: default
spec:
  targetRefs:
    - group: "gateway.envoyproxy.io"
      kind: Backend
      name: kiwi
  validation:
    wellKnownCACertificates: "System"
    hostname: mcp.kiwi.com
---
###################################################################################
############################### Gateway Definitions ###############################
###################################################################################
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: aigw-run
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: aigw-run
  namespace: default
spec:
  gatewayClassName: aigw-run
  listeners:
    - name: http
      protocol: HTTP
      port: 1975
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: envoy-ai-gateway
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-ai-gateway
  namespace: default
spec:
  provider:
    type: Host
    host:
      envoyVersion: "1.37.1"
  logging:
    level:
      default: error
      dynamic_modules: debug
  bootstrap:
    type: Merge
    value: |-
      admin:
        address:
          socket_address:
            address: 127.0.0.1
            port_value: 9901
  telemetry:
    accessLog:
      settings:
        - matches:
            - "request.headers['x-ai-eg-mcp-backend'] != ''"
          sinks:
            - type: File
              file:
                path: /dev/stdout
          format:
            type: JSON
            json:
              # Log the authorization header
              authorization: "%REQ(AUTHORIZATION)%"
              # MCP specific fields
              jsonrpc.request.id: "%DYNAMIC_METADATA(io.envoy.ai_gateway:mcp_request_id)%"
              mcp.session.id: "%REQ(MCP-SESSION-ID)%"
              mcp.method.name: "%DYNAMIC_METADATA(io.envoy.ai_gateway:mcp_method)%"
              session.id: "%DYNAMIC_METADATA(io.envoy.ai_gateway:session.id)%"
              mcp.provider.name: "%DYNAMIC_METADATA(io.envoy.ai_gateway:mcp_backend)%"
              # Common fields
              start_time: "%START_TIME%"
              method: "%REQ(:METHOD)%"
              request.path: "%REQ(:PATH)%"
              x-envoy-origin-path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
              response_code: "%RESPONSE_CODE%"
              connection_termination_details: "%CONNECTION_TERMINATION_DETAILS%"
              upstream_transport_failure_reason: "%UPSTREAM_TRANSPORT_FAILURE_REASON%"
              bytes_received: "%BYTES_RECEIVED%"
              bytes_sent: "%BYTES_SENT%"
              duration: "%DURATION%"
              x-envoy-upstream-service-time: "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%"
              x-forwarded-for: "%REQ(X-FORWARDED-FOR)%"
              user-agent: "%REQ(USER-AGENT)%"
              x-request-id: "%REQ(X-REQUEST-ID)%"
              upstream_host: "%UPSTREAM_HOST%"
              upstream_cluster: "%UPSTREAM_CLUSTER%"
              upstream_local_address: "%UPSTREAM_LOCAL_ADDRESS%"
              downstream_local_address: "%DOWNSTREAM_LOCAL_ADDRESS%"
              downstream_remote_address: "%DOWNSTREAM_REMOTE_ADDRESS%"
