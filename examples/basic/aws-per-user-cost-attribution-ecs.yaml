# 2. ext-auth Task Definition:
{
  "family": "ext-auth",
  "networkMode": "awsvpc",
  "requiresCompatibilities": ["FARGATE"],
  "cpu": "256",
  "memory": "512",
  "taskRoleArn": "arn:aws:iam::ACCOUNT_ID:role/ext-auth-task-role",
  "executionRoleArn": "arn:aws:iam::ACCOUNT_ID:role/ecsTaskExecutionRole",
  "containerDefinitions": [
    {
      "name": "ext-auth",
      "image": "ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/ext-auth:latest",
      "essential": true,
      "portMappings": [
        {
          "containerPort": 8080,
          "protocol": "tcp"
        }
      ],
      "environment": [
        {
          "name": "AWS_REGION",
          "value": "us-east-1"
        },
        {
          "name": "TARGET_ROLE_ARN",
          "value": "arn:aws:iam::ACCOUNT_ID:role/ai-gateway-bedrock-tagging"
        }
      ],
      "secrets": [
        {
          "name": "REDIS_PASSWORD",
          "valueFrom": "arn:aws:secretsmanager:us-east-1:ACCOUNT_ID:secret:redis-password"
        }
      ],
      "logConfiguration": {
        "logDriver": "awslogs",
        "options": {
          "awslogs-group": "/ecs/ext-auth",
          "awslogs-region": "us-east-1",
          "awslogs-stream-prefix": "auth"
        }
      }
    }
  ]
}

