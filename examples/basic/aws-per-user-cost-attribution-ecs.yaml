# ECS Service Creation:
# aws ecs create-service \
#   --cluster my-cluster \
#   --service-name ai-gateway \
#   --task-definition ai-gateway:1 \
#   --desired-count 2 \
#   --launch-type FARGATE \
#   --network-configuration "awsvpcConfiguration={subnets=[subnet-12345],securityGroups=[sg-12345],assignPublicIp=DISABLED}" \
#   --load-balancers "targetGroupArn=arn:aws:elasticloadbalancing:us-east-1:ACCOUNT_ID:targetgroup/ai-gateway/abc123,containerName=envoy-ai-gateway,containerPort=80"
#
# Service Discovery (AWS Cloud Map):
# aws servicediscovery create-service \
#   --name ext-auth \
#   --dns-config "NamespaceId=ns-12345,DnsRecords=[{Type=A,TTL=10}]" \
#   --health-check-custom-config FailureThreshold=1
#
# How it Works with ECS Task Roles:
# 1. ext-auth container uses its Task Role credentials to call STS AssumeRole
# 2. ext-auth injects temporary per-user credentials as x-aws-* headers
# 3. AI Gateway container checks for x-aws-* headers:
#    - If present: Uses per-user credentials (with session tags) ✅
#    - If not present: Uses its Task Role credentials (fallback) ✅
# 4. AWS SDK automatically retrieves Task Role credentials via ECS credential provider
