apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: my-route
spec:
  parentRefs:
    - name: my-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: gpt-4
      backendRefs:
        - name: my-openai-backend
          headerMutation:
            set:
              - name: "x-route-specific"
                value: "premium"
          bodyMutation:
            set:
              - path: "max_tokens"
                value: "8192"
